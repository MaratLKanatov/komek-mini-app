<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kaspi Komek - Подключение</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- Заголовок -->
        <div class="header">
            <div class="logo">
                <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                    <rect width="48" height="48" rx="12" fill="#F14635"/>
                    <path d="M12 24L21 33L36 15" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <h1>Подключение Kaspi</h1>
            <p class="subtitle">Введите данные вашего магазина</p>
        </div>

        <!-- Форма -->
        <form id="kaspiAuthForm" class="auth-form">
            <!-- Логин -->
            <div class="form-group">
                <label for="login">
                    <span class="label-icon">👤</span>
                    Логин Kaspi Магазин
                </label>
                <div class="input-wrapper">
                    <input 
                        type="text" 
                        id="login" 
                        name="login" 
                        placeholder="seller@example.com или +7 XXX XXX XX XX"
                        autocomplete="username"
                        required
                    >
                </div>
                <p class="hint">Введите email или номер телефона, привязанный к Kaspi</p>
            </div>

            <!-- Пароль -->
            <div class="form-group">
                <label for="password">
                    <span class="label-icon">🔐</span>
                    Пароль
                </label>
                <div class="input-wrapper">
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="••••••••"
                        autocomplete="current-password"
                        required
                    >
                    <button type="button" class="toggle-password" id="togglePasswordBtn">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <path d="M10 4C4 4 1 10 1 10C1 10 4 16 10 16C16 16 19 10 19 10C19 10 16 4 10 4Z" stroke="currentColor" stroke-width="1.5"/>
                            <circle cx="10" cy="10" r="3" stroke="currentColor" stroke-width="1.5"/>
                        </svg>
                    </button>
                </div>
                <p class="hint">Пароль от личного кабинета Kaspi Магазин</p>
            </div>

            <!-- API Токен -->
            <div class="form-group">
                <label for="token">
                    <span class="label-icon">🔑</span>
                    API Токен
                </label>
                <div class="input-wrapper">
                    <textarea 
                        id="token" 
                        name="token" 
                        placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                        rows="3"
                        required
                    ></textarea>
                    <button type="button" class="paste-button" id="pasteTokenBtn">
                        📋
                    </button>
                </div>
                <p class="hint">
                    Настройки магазина → API интеграция → Создать токен
                </p>
            </div>

            <!-- Дополнительные настройки -->
            <div class="form-group">
                <label class="checkbox-label">
                    <input type="checkbox" id="saveCredentials" checked>
                    <span class="checkbox-custom"></span>
                    <span class="checkbox-text">Сохранить данные для автоподключения</span>
                </label>
            </div>

            <div class="form-group">
                <label class="checkbox-label">
                    <input type="checkbox" id="autoAcceptOrders" checked>
                    <span class="checkbox-custom"></span>
                    <span class="checkbox-text">Автоматически принимать новые заказы</span>
                </label>
            </div>

            <!-- Кнопка отправки -->
            <div class="form-actions">
                <button type="submit" class="btn btn-primary" id="submitBtn">
                    <span class="btn-text">Подключить</span>
                    <span class="btn-loader" style="display: none;">
                        <svg width="20" height="20" viewBox="0 0 20 20">
                            <circle cx="10" cy="10" r="8" stroke="currentColor" stroke-width="2" fill="none" stroke-dasharray="40" stroke-dashoffset="20">
                                <animateTransform attributeName="transform" type="rotate" from="0 10 10" to="360 10 10" dur="1s" repeatCount="indefinite"/>
                            </circle>
                        </svg>
                    </span>
                </button>
            </div>
        </form>

        <!-- Сообщения -->
        <div id="messageContainer" class="message-container" style="display: none;"></div>
        
        <!-- Статус Telegram -->
        <div id="telegramStatus" class="telegram-status"></div>
    </div>

    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Основной скрипт -->
    <script src="js/app.js"></script>
</body>
</html>
